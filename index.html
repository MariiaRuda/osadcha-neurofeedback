<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osadcha Neurofeedback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Georgia', serif;
      color: #f0e8d8;
    }

    .card {
      text-align: center;
      padding: 60px 48px;
      max-width: 540px;
      width: 90%;
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a6a3a;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: normal;
      line-height: 1.4;
      margin-bottom: 12px;
      color: #f0e8d8;
    }

    .author {
      font-size: 15px;
      color: #a08060;
      margin-bottom: 48px;
      font-style: italic;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, #8b1a1a, #c8a020);
      margin: 0 auto 48px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6a5a4a;
      margin-bottom: 16px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border: 1px solid #4a3a2a;
      border-radius: 4px;
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 1px;
      transition: all 0.25s ease;
      min-width: 160px;
    }

    .btn-ua {
      background: rgba(139, 26, 26, 0.15);
      color: #e8c070;
      border-color: #8b1a1a;
    }

    .btn-en {
      background: rgba(200, 160, 32, 0.1);
      color: #f0e8d8;
      border-color: #6a5a3a;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .btn-ua:hover {
      background: rgba(139, 26, 26, 0.35);
      border-color: #c8a020;
    }

    .btn-en:hover {
      background: rgba(200, 160, 32, 0.2);
      border-color: #c8a020;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="subtitle">Research Presentation</p>
    <h1>Neurofeedback Rehabilitation for Military Personnel</h1>
    <p class="author">Oksana Osadcha</p>
    <div class="divider"></div>
    <p class="label">Select language</p>
    <div class="btn-group">
      <a class="btn btn-ua" href="html-kobzar/kobzar_ua.html">🇺🇦 Українська</a>
      <a class="btn btn-en" href="html-kobzar/kobzar_en.html">🇬🇧 English</a>
    </div>
  </div>
</body>
</html>
